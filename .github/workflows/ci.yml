name: CI/CD

on:
  push:
    branches: ["main"]
  pull_request:

jobs:
  quality-and-build:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write
      security-events: write

    defaults:
      run:
        working-directory: apps/event-service

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: apps/event-service/go.mod
          cache-dependency-path: apps/event-service/go.sum

      - name: Download deps
        run: go mod download

      - name: Check formatting
        run: |
          fmt_output=$(gofmt -l .)
          if [ -n "$fmt_output" ]; then
            echo "Not formatted:"
            echo "$fmt_output"
            exit 1
          fi

      - name: Go vet
        run: go vet ./...

      - name: Run tests
        run: go test ./...

      - name: Lint Dockerfile
        uses: hadolint/hadolint-action@v3.3.0
        with:
          dockerfile: apps/event-service/Dockerfile

      - name: Set up Helm
        uses: azure/setup-helm@v4

      - name: Helm lint
        run: helm lint ../../event-service-chart

      - name: Install kubeconform
        working-directory: .
        run: |
          KUBECONFORM_VERSION=0.6.7
          curl -L -o kubeconform.tar.gz \
            https://github.com/yannh/kubeconform/releases/download/v${KUBECONFORM_VERSION}/kubeconform-linux-amd64.tar.gz
          tar -xzf kubeconform.tar.gz
          sudo mv kubeconform /usr/local/bin/kubeconform
          kubeconform -v

      - name: Validate rendered Helm manifests
        working-directory: .
        run: |
          helm template event-service ./event-service-chart > rendered.yaml
          kubeconform -strict -summary rendered.yaml

      - name: Set up Docker
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        if: github.event_name == 'push'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set image tags
        id: vars
        run: |
          SHORT_SHA=${GITHUB_SHA::7}
          echo "short_sha=$SHORT_SHA" >> $GITHUB_OUTPUT
          echo "image_repo=ghcr.io/${{ github.repository_owner }}/event-service" >> $GITHUB_OUTPUT

      - name: Build image
        run: |
          IMAGE_REPO="${{ steps.vars.outputs.image_repo }}"
          SHORT_SHA="${{ steps.vars.outputs.short_sha }}"

          docker build \
            -t ${IMAGE_REPO}:latest \
            -t ${IMAGE_REPO}:${SHORT_SHA} \
            .

      - name: Scan image with Trivy
        uses: aquasecurity/trivy-action@v0.35.0
        with:
          image-ref: ghcr.io/${{ github.repository_owner }}/event-service:${{ steps.vars.outputs.short_sha }}
          format: 'table'
          exit-code: '1'
          ignore-unfixed: true
          severity: 'HIGH,CRITICAL'

      - name: Push image
        if: github.event_name == 'push'
        run: |
          IMAGE_REPO="${{ steps.vars.outputs.image_repo }}"
          SHORT_SHA="${{ steps.vars.outputs.short_sha }}"

          docker push ${IMAGE_REPO}:latest
          docker push ${IMAGE_REPO}:${SHORT_SHA}

      - name: Output image refs
        if: github.event_name == 'push'
        run: |
          echo "Pushed:"
          echo "ghcr.io/${{ github.repository_owner }}/event-service:latest"
          echo "ghcr.io/${{ github.repository_owner }}/event-service:${{ steps.vars.outputs.short_sha }}"
