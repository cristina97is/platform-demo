name: CI/CD

on:
  push:
    branches: ["main"]

jobs:
  build-test-push:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    defaults:
      run:
        working-directory: apps/event-service

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: apps/event-service/go.mod
          cache-dependency-path: apps/event-service/go.sum

      - name: Download deps
        run: go mod download

      - name: Check formatting
        run: |
          fmt_output=$(gofmt -l .)
          if [ -n "$fmt_output" ]; then
            echo "Not formatted:"
            echo "$fmt_output"
            exit 1
          fi

      - name: Go vet
        run: go vet ./...

      - name: Run tests
        run: go test ./...

      - name: Set up Docker
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set image tags
        id: vars
        run: |
          SHORT_SHA=${GITHUB_SHA::7}
          echo "short_sha=$SHORT_SHA" >> $GITHUB_OUTPUT
          echo "image_repo=ghcr.io/${{ github.repository_owner }}/event-service" >> $GITHUB_OUTPUT

      - name: Build and push image
        run: |
          IMAGE_REPO="${{ steps.vars.outputs.image_repo }}"
          SHORT_SHA="${{ steps.vars.outputs.short_sha }}"

          docker build \
            -t ${IMAGE_REPO}:latest \
            -t ${IMAGE_REPO}:${SHORT_SHA} \
            .

          docker push ${IMAGE_REPO}:latest
          docker push ${IMAGE_REPO}:${SHORT_SHA}

      - name: Output image refs
        run: |
          echo "Pushed:"
          echo "ghcr.io/${{ github.repository_owner }}/event-service:latest"
          echo "ghcr.io/${{ github.repository_owner }}/event-service:${{ steps.vars.outputs.short_sha }}"
